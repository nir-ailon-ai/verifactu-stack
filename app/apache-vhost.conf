<VirtualHost *:80>
    ServerName _
    DocumentRoot /var/www/html/facturas

    <Directory /var/www/html/facturas>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Gestoria upload UI — served from the /incoming volume mount
    Alias /gestoria /incoming/gestoria
    <Directory /incoming/gestoria>
        Options -Indexes
        AllowOverride None
        Require all granted
        DirectoryIndex index.php
    </Directory>

    ErrorLog  ${APACHE_LOG_DIR}/fs-error.log
    CustomLog ${APACHE_LOG_DIR}/fs-access.log combined
</VirtualHost>
